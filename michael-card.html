<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/css/reset.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/michael-card-style.css" />
    <title>User Card Michael</title>
  </head>
  <body>
    <article class="user-card">
      <img
        src="/assets/images/michael-img.jpg"
        alt="Michael Akinwumi"
        class="user-img"
      />
      <h1 class="user-name">AKINWUMI MICHAEL</h1>
      <p class="user-profession">Product Design Track</p>
      <p class="user-description">
        I choose product design because i love seeing beautiful interfaces and to be
        able to solve user’s problems.
      </p>
      <h2 class="contact-title">Contact</h2>
      <div class="contacts-container">
        <a href="#" class="contact-link"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#" class="contact-link"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="#" class="contact-link"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" class="contact-link"><i class="fa-brands fa-twitter"></i></a>
      </div>
      <p class="line"></p>
      <div class="buttons-container">
        <button class="btn">Contact Me</button>
        <button class="btn">Hire Me</button>
      </div>
    </article>
  </body>
</html>
