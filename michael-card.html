<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/assets/css/michael-card-style.css" />
    <title>User Card Michael</title>
  </head>
  <body>
    <div class="user-card">
      <img
        src="/assets/images/michael-img.jpg"
        alt="Michael Akinwumi"
        class="user-img"
      />
      <h1 class="user-name">AKINWUMI MICHAEL</h1>
      <p class="user-profession">Product Design Track</p>
      <p class="user-description">
        I choose product design because i love seeing beautiful interfaces and to be
        able to solve user’s problems.
      </p>
      <h2 class="contact-title">Contact</h2>
      <div class="contacts-container">
        <i class="fa-brands fa-facebook-f"></i>
        <i class="fa-brands fa-whatsapp"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-twitter"></i>
      </div>
      <p class="line">________________________________________________</p>
      <div class="buttons-container">
        <button>Contact Me</button>
        <button>Hire Me</button>
      </div>
    </div>
  </body>
</html>
